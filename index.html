<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>CostTrack - Modern Cost Management Application</title>
  
  <link rel='stylesheet' href='style.css'>
  
  <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
  
  <script src='db.js'></script>
  
  <script src='app.js'></script>
</head>
<body>

  <div class='app-wrapper'>
    
    <header class='app-header'>
      <div class='header-icon'>💳</div>
      <div>
        <h1>CostTrack</h1>
        <p>Advanced Frontend OOP Final Project Dashboard</p>
      </div>
    </header>

    <nav class='app-nav'>
      <button class='nav-btn active' data-section='sec-add-cost'>Add Expense</button>
      <button class='nav-btn' data-section='sec-monthly-report'>Monthly Report</button>
      <button class='nav-btn' data-section='sec-yearly-overview'>Yearly Overview</button>
    </nav>

    <main>
      
      <section id='sec-add-cost' class='section active'>
        <div class='card'>
          <h2 class='card-title'><span>➕</span> Log New Expense</h2>
          <div class='form-grid'>
            
            <div class='form-group'>
              <label for='cost-sum'>Amount / Sum</label>
              <input type='number' id='cost-sum' placeholder='e.g. 45.50' min='0.01' step='0.01'>
            </div>
            
            <div class='form-group'>
              <label for='cost-currency'>Currency</label>
              <select id='cost-currency'>
                <option value='USD'>USD ($)</option>
                <option value='ILS'>ILS (₪)</option>
                <option value='EUR'>EUR (€)</option>
              </select>
            </div>
            
            <div class='form-group full-width'>
              <label for='cost-category'>Expense Category</label>
              <select id='cost-category'>
                </select>
            </div>
            
            <div class='form-group full-width'>
              <label for='cost-desc'>Description</label>
              <textarea id='cost-desc' placeholder='What was this expense for?'></textarea>
            </div>
            
            <div class='form-group full-width' style='margin-top: 6px;'>
              <button id='btn-add-cost' class='btn-primary'>Save Expense</button>
            </div>
            
          </div>
        </div>
      </section>

      <section id='sec-monthly-report' class='section'>
        <div class='card'>
          <h2 class='card-title'><span>📅</span> Monthly Analytical Report</h2>
          
          <div class='controls-row'>
            <div class='form-group'>
              <label for='report-month'>Month</label>
              <select id='report-month'>
                </select>
            </div>
            <div class='form-group'>
              <label for='report-year'>Year</label>
              <select id='report-year' class='year-select'>
                </select>
            </div>
            <button id='btn-report' class='btn-secondary'>Generate Report</button>
          </div>

          <div id='report-results' style='margin-top: 20px;'>
            <div class='empty-msg'>Select a month and year above to view your report.</div>
          </div>

          <div id='pie-wrapper'>
            <h3 class='chart-title'>Expense Breakdown by Category</h3>
            <div style='position: relative; height:320px; width:100%'>
              <canvas id='pie-chart'></canvas>
            </div>
          </div>
          
        </div>
      </section>

      <section id='sec-yearly-overview' class='section'>
        <div class='card'>
          <h2 class='card-title'><span>📊</span> Yearly Cumulative Overview</h2>
          
          <div class='controls-row'>
            <div class='form-group'>
              <label for='bar-year'>Select Target Year</label>
              <select id='bar-year' class='year-select'>
                </select>
            </div>
            <button id='btn-bar' class='btn-secondary'>Analyze Trends</button>
          </div>

          <div style='position: relative; height:380px; width:100%; margin-top: 24px;'>
            <canvas id='bar-chart'></canvas>
          </div>
          
        </div>
      </section>

    </main>
  </div>

  <div id='toast' class='toast'></div>

</body>
</html>
